# This is a Databricks asset bundle definition for my_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_test123

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: "Unity Catalog catalog"
    default: main
  schema:
    description: "Unity Catalog schema"
    default: app
  volume_name:
    description: "UC volume name used for files/state"
    default: files
  service_principal_id:
    description: "Service principal application (client) ID"
    default: ""
  warehouse_id:
    description: "SQL warehouse used by the taxi app"
    default: "514efc70154b4e6e"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-e3f191cd-7308.cloud.databricks.com
      root_path: ~/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      host: https://dbc-e3f191cd-7308.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/mathiasnissen@hotmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/mathiasnissen@hotmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: mathiasnissen@hotmail.com
        level: CAN_MANAGE
